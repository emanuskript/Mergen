services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./backend/models:/app/models:ro
      - backend-data:/app/data
    environment:
      - CORS_ORIGINS=*
      - MODEL_DIR=/app/models
      - MAX_POOL_WORKERS=2
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ANALYTICS_USERNAME=${ANALYTICS_USERNAME:-admin}
      - ANALYTICS_PASSWORD=${ANALYTICS_PASSWORD:-layout2024}
    deploy:
      resources:
        limits:
          memory: 4G

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  backend-data:
  caddy-data:
  caddy-config:
